<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Grid & Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        neo: {
                            light: '#e0e5ec',
                            dark: '#0f172a',
                        }
                    },
                    boxShadow: {
                        'neo-light': '9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5)',
                        'neo-light-inner': 'inset 6px 6px 10px 0 rgba(163,177,198, 0.7), inset -6px -6px 10px 0 rgba(255,255,255, 0.8)',
                        'neo-dark': '9px 9px 16px rgb(0,0,0,0.6), -9px -9px 16px rgba(30,41,59, 0.5)',
                        'neo-dark-inner': 'inset 6px 6px 10px 0 rgba(0,0,0, 0.8), inset -6px -6px 10px 0 rgba(30,41,59, 0.8)',
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; box-sizing: border-box; }
        
        body { transition: background-color 0.5s ease, color 0.5s ease; }

        /* Glassmorphism */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Ambient Neon Glows */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            z-index: -1;
            animation: float 12s infinite alternate ease-in-out;
        }
        .orb-1 { width: 35vw; height: 35vw; top: -10%; left: -10%; background: rgba(56, 189, 248, 0.3); }
        .orb-2 { width: 45vw; height: 45vw; bottom: -10%; right: -10%; background: rgba(139, 92, 246, 0.2); }
        .dark .orb-1 { background: rgba(56, 189, 248, 0.15); }
        .dark .orb-2 { background: rgba(168, 85, 247, 0.15); }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, 5vh) scale(1.1); }
        }

        /* Grid Nodes */
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .circle-node {
            border-radius: 50%;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transition: all 0.3s ease;
        }
        
        /* Neon Elapsed / Remaining */
        .circle-elapsed {
            background: rgba(244, 63, 94, 0.9);
            box-shadow: 0 0 8px rgba(244, 63, 94, 0.6), inset 2px 2px 4px rgba(255,255,255,0.3);
        }
        .dark .circle-elapsed {
            background: rgba(225, 29, 72, 1);
            box-shadow: 0 0 12px rgba(225, 29, 72, 0.8), inset 2px 2px 4px rgba(255,255,255,0.2);
        }
        
        .circle-remaining {
            background: rgba(14, 165, 233, 0.9);
            box-shadow: 0 0 8px rgba(14, 165, 233, 0.6), inset 2px 2px 4px rgba(255,255,255,0.3);
        }
        .dark .circle-remaining {
            background: rgba(56, 189, 248, 1);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.8), inset 2px 2px 4px rgba(255,255,255,0.2);
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@700&display=swap');
        .font-mono-space { font-family: 'Space Mono', monospace; }
        .font-grotesk { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden bg-neo-light text-slate-800 dark:bg-neo-dark dark:text-slate-100 flex flex-col items-center p-2 sm:p-4 relative font-grotesk">
    
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="absolute top-4 left-4 right-4 z-20 flex justify-between items-center px-2">
        <div class="flex items-center space-x-2 px-4 py-2 rounded-full glass shadow-neo-light dark:shadow-neo-dark">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_#22c55e]"></div>
            <span id="live-clock" class="text-sm sm:text-base font-semibold tracking-wide opacity-90">Loading...</span>
        </div>

        <button id="theme-toggle" class="w-10 h-10 rounded-full shadow-neo-light dark:shadow-neo-dark flex items-center justify-center transition-all hover:scale-105 active:shadow-neo-light-inner dark:active:shadow-neo-dark-inner bg-neo-light dark:bg-neo-dark border border-white/20 dark:border-white/5">
            <svg id="moon-icon" class="w-5 h-5 hidden dark:block text-yellow-300 drop-shadow-[0_0_5px_rgba(253,224,71,0.5)]" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            <svg id="sun-icon" class="w-5 h-5 block dark:hidden text-orange-500 drop-shadow-[0_0_5px_rgba(249,115,22,0.5)]" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4.22 2.32a1 1 0 011.415 0l.707.707a1 1 0 01-1.414 1.415l-.707-.707a1 1 0 010-1.415zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zm-4.22 4.22a1 1 0 010 1.415l-.707.707a1 1 0 01-1.415-1.414l.707-.707a1 1 0 011.415 0zM10 16a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zm-4.22-2.32a1 1 0 01-1.415 0l-.707-.707a1 1 0 011.414-1.415l.707.707a1 1 0 010 1.415zM2 10a1 1 0 011-1h1a1 1 0 110 2H3a1 1 0 01-1-1zm2.32-4.22a1 1 0 010-1.415l.707-.707a1 1 0 011.415 1.414L4.93 5.05A1 1 0 014.32 5.78zM10 5a5 5 0 100 10 5 5 0 000-10z" clip-rule="evenodd"></path></svg>
        </button>
    </div>

    <div class="glass flex-1 w-full max-w-7xl flex flex-col rounded-[2.5rem] p-4 sm:p-6 shadow-2xl z-10 relative h-full mt-14 sm:mt-16">
        
        <div class="text-center mb-3 sm:mb-4 flex flex-col items-center shrink-0">
            <div class="flex gap-1 sm:gap-3 md:gap-5 lg:gap-8 justify-center items-end text-shadow-neon font-mono-space tracking-wider">
                <div class="flex flex-col items-center"><span id="cd-mo" class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl font-bold">00</span><span class="text-xs sm:text-sm tracking-widest uppercase opacity-70">Months</span></div><span class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl opacity-40 font-bold -translate-y-4 sm:-translate-y-5 lg:-translate-y-6">:</span>
                <div class="flex flex-col items-center"><span id="cd-wk" class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl font-bold">00</span><span class="text-xs sm:text-sm tracking-widest uppercase opacity-70">Weeks</span></div><span class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl opacity-40 font-bold -translate-y-4 sm:-translate-y-5 lg:-translate-y-6">:</span>
                <div class="flex flex-col items-center"><span id="cd-dy" class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl font-bold">00</span><span class="text-xs sm:text-sm tracking-widest uppercase opacity-70">Days</span></div><span class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl opacity-40 font-bold -translate-y-4 sm:-translate-y-5 lg:-translate-y-6">:</span>
                <div class="flex flex-col items-center"><span id="cd-hr" class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl font-bold">00</span><span class="text-xs sm:text-sm tracking-widest uppercase opacity-70">Hrs</span></div><span class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl opacity-40 font-bold -translate-y-4 sm:-translate-y-5 lg:-translate-y-6">:</span>
                <div class="flex flex-col items-center"><span id="cd-mi" class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl font-bold">00</span><span class="text-xs sm:text-sm tracking-widest uppercase opacity-70">Mins</span></div><span class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl opacity-40 font-bold -translate-y-4 sm:-translate-y-5 lg:-translate-y-6">:</span>
                <div class="flex flex-col items-center"><span id="cd-sc" class="text-3xl sm:text-5xl md:text-5xl lg:text-6xl font-bold text-sky-500 dark:text-sky-400 drop-shadow-[0_0_8px_rgba(56,189,248,0.8)]">00</span><span class="text-xs sm:text-sm tracking-widest uppercase opacity-70">Secs</span></div>
            </div>

            <div id="unit-indicator" class="mt-4 px-4 py-1.5 rounded-full bg-black/5 dark:bg-white/10 text-[0.65rem] sm:text-xs font-semibold tracking-wider border border-white/10 shadow-inner">
                Initializing Matrix...
            </div>
        </div>

        <div class="flex-1 w-full bg-slate-900/5 dark:bg-black/20 rounded-2xl shadow-neo-light-inner dark:shadow-neo-dark-inner p-2 sm:p-4 overflow-hidden relative border border-transparent dark:border-white/5 flex flex-col">
            <div id="grid-canvas" class="flex-1 w-full h-full flex flex-wrap justify-center content-start gap-[2px] sm:gap-1">
                </div>
        </div>

        <div class="mt-3 sm:mt-4 shrink-0 px-6 py-3 sm:py-4 rounded-xl glass border-t border-white/20 dark:border-white/10 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="w-5 h-5 text-fuchsia-500 drop-shadow-[0_0_5px_rgba(217,70,239,0.8)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span class="text-xs sm:text-sm font-semibold tracking-widest uppercase opacity-80">Remaining Work Yield:</span>
            </div>
            <div class="text-sm sm:text-lg font-mono-space font-bold tracking-widest text-fuchsia-500 dark:text-fuchsia-400 drop-shadow-[0_0_8px_rgba(217,70,239,0.5)]">
                <span id="work-hours-val">0 DAYS / 0 HRS</span>
            </div>
        </div>
    </div>

    <button id="fab-btn" class="absolute bottom-6 right-6 z-30 w-14 h-14 rounded-full bg-neo-light dark:bg-neo-dark shadow-neo-light dark:shadow-neo-dark flex items-center justify-center text-sky-500 dark:text-sky-400 hover:scale-110 active:shadow-neo-light-inner dark:active:shadow-neo-dark-inner transition-transform duration-300 group border border-white/10">
        <svg class="w-6 h-6 transform group-hover:rotate-90 transition-transform duration-300 drop-shadow-[0_0_5px_currentColor]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
    </button>

    <div id="setup-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-md" id="modal-backdrop"></div>
        
        <div class="glass relative w-[90%] max-w-md rounded-[2rem] p-6 sm:p-8 shadow-2xl transform scale-95 transition-transform duration-300 flex flex-col gap-6 border-t border-l border-white/40 dark:border-white/10" id="modal-content">
            <h2 class="text-2xl font-bold text-center tracking-wide drop-shadow-md">Matrix Params</h2>
            
            <div class="flex flex-col gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold opacity-80 pl-2 uppercase tracking-widest">Start Epoch</label>
                    <input type="datetime-local" id="input-start" class="w-full p-3 rounded-xl bg-neo-light dark:bg-neo-dark shadow-neo-light-inner dark:shadow-neo-dark-inner border-none outline-none focus:ring-2 focus:ring-sky-400 transition-shadow text-sm font-mono-space">
                </div>
                
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold opacity-80 pl-2 uppercase tracking-widest">End Epoch</label>
                    <input type="datetime-local" id="input-end" class="w-full p-3 rounded-xl bg-neo-light dark:bg-neo-dark shadow-neo-light-inner dark:shadow-neo-dark-inner border-none outline-none focus:ring-2 focus:ring-fuchsia-400 transition-shadow text-sm font-mono-space">
                </div>
            </div>

            <div class="flex gap-4 mt-2">
                <button id="btn-generate" class="flex-1 py-3 rounded-xl font-bold text-sm bg-neo-light dark:bg-neo-dark shadow-neo-light dark:shadow-neo-dark hover:scale-105 active:shadow-neo-light-inner dark:active:shadow-neo-dark-inner transition-all text-sky-600 dark:text-sky-400">
                    Inject Local
                </button>
                <button id="btn-copy" class="flex-1 py-3 rounded-xl font-bold text-sm bg-neo-light dark:bg-neo-dark shadow-neo-light dark:shadow-neo-dark hover:scale-105 active:shadow-neo-light-inner dark:active:shadow-neo-dark-inner transition-all text-fuchsia-600 dark:text-fuchsia-400">
                    Copy Permlink
                </button>
            </div>
            
            <p id="copy-toast" class="text-center text-xs font-bold text-fuchsia-500 opacity-0 transition-opacity">URL copied to clipboard.</p>
        </div>
    </div>

    <script>
        // DOM Nodes
        const liveClockEl = document.getElementById('live-clock');
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        const gridCanvas = document.getElementById('grid-canvas');
        const unitIndicator = document.getElementById('unit-indicator');
        const workHoursVal = document.getElementById('work-hours-val');
        
        // Timer Nodes
        const elMo = document.getElementById('cd-mo');
        const elWk = document.getElementById('cd-wk');
        const elDy = document.getElementById('cd-dy');
        const elHr = document.getElementById('cd-hr');
        const elMi = document.getElementById('cd-mi');
        const elSc = document.getElementById('cd-sc');

        // Modal Form Nodes
        const fabBtn = document.getElementById('fab-btn');
        const setupModal = document.getElementById('setup-modal');
        const modalBackdrop = document.getElementById('modal-backdrop');
        const inputStart = document.getElementById('input-start');
        const inputEnd = document.getElementById('input-end');
        const btnGenerate = document.getElementById('btn-generate');
        const btnCopy = document.getElementById('btn-copy');
        const copyToast = document.getElementById('copy-toast');

        // System State
        let startDate = null;
        let endDate = null;
        let totalEntities = 0;
        let elapsedEntities = 0;
        let mainLoop = null;

        // Configuration Maths
        const MS_SEC = 1000;
        const MS_MIN = MS_SEC * 60;
        const MS_HR = MS_MIN * 60;
        const MS_DAY = MS_HR * 24;
        const MS_WK = MS_DAY * 7;
        const MS_MO = MS_DAY * 30.4375;

        // Theme Switch
        themeToggle.addEventListener('click', () => { htmlElement.classList.toggle('dark'); });

        // --- Timezone Helper ---
        function getNow() {
            const params = new URLSearchParams(window.location.search);
            const city = params.get('city');
            if (city) {
                try {
                    const tzString = new Date().toLocaleString('en-US', { timeZone: decodeURIComponent(city) });
                    return new Date(tzString);
                } catch(e) { }
            }
            return new Date();
        }

        // --- Clock Routine ---
        function updateLiveClock() {
            const params = new URLSearchParams(window.location.search);
            const city = params.get('city');
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit', second:'2-digit' };
            if (city) {
                try { options.timeZone = decodeURIComponent(city); } catch(e){}
            }
            liveClockEl.innerText = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateLiveClock, 1000);
        updateLiveClock();

        // --- Date Handlers ---
        function parseDateParam(str) {
            if (!str) return null;
            const parts = str.split('-');
            if (parts.length !== 5) return null;
            return new Date(parts[2], parts[1]-1, parts[0], parts[3], parts[4]);
        }
        function formatDateToParam(d) {
            const p = n => n.toString().padStart(2, '0');
            return `${p(d.getDate())}-${p(d.getMonth()+1)}-${d.getFullYear()}-${p(d.getHours())}-${p(d.getMinutes())}`;
        }
        function formatDateForInput(d) {
            const p = n => n.toString().padStart(2, '0');
            return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
        }

        // --- Bootstrapper ---
        function initializeApp() {
            const params = new URLSearchParams(window.location.search);
            startDate = parseDateParam(params.get('a'));
            endDate = parseDateParam(params.get('b'));

            const now = getNow();
            if (!startDate || isNaN(startDate) || !endDate || isNaN(endDate)) {
                startDate = new Date(now.getFullYear(), 0, 1, 0, 0); // Default to start of current year
                endDate = new Date(now.getFullYear(), 11, 31, 23, 59); // Default to end of current year
            }

            inputStart.value = formatDateForInput(startDate);
            inputEnd.value = formatDateForInput(endDate);

            runEngine();
            buildMatrix();
        }

        // --- Main Computation Engine ---
        function runEngine() {
            if (mainLoop) clearInterval(mainLoop);

            const tick = () => {
                const now = getNow();
                let msDiff = endDate - now;
                if (msDiff < 0) msDiff = 0;

                // Time String Builder
                const pad = n => n.toString().padStart(2, '0');
                
                let rem = msDiff;
                const mo = Math.floor(rem / MS_MO); rem %= MS_MO;
                const wk = Math.floor(rem / MS_WK); rem %= MS_WK;
                const dy = Math.floor(rem / MS_DAY); rem %= MS_DAY;
                const hr = Math.floor(rem / MS_HR); rem %= MS_HR;
                const mi = Math.floor(rem / MS_MIN); rem %= MS_MIN;
                const sc = Math.floor(rem / MS_SEC);

                elMo.innerText = pad(mo);
                elWk.innerText = pad(wk);
                elDy.innerText = pad(dy);
                elHr.innerText = pad(hr);
                elMi.innerText = pad(mi);
                elSc.innerText = pad(sc);

                // Work Yield Calculator (9 hours per full remaining day in entire duration)
                const totalDaysLeft = msDiff / MS_DAY;
                const estWorkHrs = Math.max(0, Math.floor(totalDaysLeft) * 9);
                workHoursVal.innerText = `${Math.floor(totalDaysLeft)} DAYS / ${estWorkHrs.toLocaleString()} HRS`;

                syncMatrixState(now);
            };

            tick();
            mainLoop = setInterval(tick, 1000);
        }

        // --- Matrix (Grid) Logic ---
        let matrixUnitStr = 'Days';
        let msPerUnit = MS_DAY;

        function buildMatrix() {
            const totalMs = endDate - startDate;
            if (totalMs <= 0) {
                totalEntities = 0; elapsedEntities = 0;
                renderNodes(); return;
            }

            const totalDays = totalMs / MS_DAY;

            if (totalDays <= 30) {
                matrixUnitStr = 'Days';
                msPerUnit = MS_DAY;
                totalEntities = Math.ceil(totalDays);
            } else if (totalDays <= 365) {
                matrixUnitStr = 'Weeks';
                msPerUnit = MS_WK;
                totalEntities = Math.ceil(totalDays / 7);
            } else {
                matrixUnitStr = 'Months';
                msPerUnit = MS_MO;
                totalEntities = Math.ceil(totalDays / 30.4375);
            }

            unitIndicator.innerHTML = `<span class="opacity-70">Grid Scale:</span> <span class="text-sky-400">1 Node = 1 ${matrixUnitStr.slice(0,-1)}</span> <span class="mx-2 opacity-50">|</span> <span class="opacity-70">Total nodes:</span> <span class="text-fuchsia-400">${totalEntities}</span>`;
            
            calcElapsedState(getNow());
            renderNodes();
        }

        function calcElapsedState(now) {
            let elapsedMs = now - startDate;
            if (elapsedMs < 0) elapsedMs = 0;
            if (elapsedMs > (endDate - startDate)) elapsedMs = endDate - startDate;
            elapsedEntities = Math.floor(elapsedMs / msPerUnit);
            if (elapsedEntities > totalEntities) elapsedEntities = totalEntities;
        }

        function syncMatrixState(now) {
            const prev = elapsedEntities;
            calcElapsedState(now);
            if(prev !== elapsedEntities) renderNodes();
        }

        function renderNodes() {
            gridCanvas.innerHTML = '';
            if (totalEntities <= 0) return;

            const rect = gridCanvas.getBoundingClientRect();
            // Gap adjustment for smaller sizes
            const gap = window.innerWidth < 640 || window.innerHeight < 700 ? 1 : 4; 
            
            let minSize = 1; // Allows circles to get much smaller vertically
            let maxSize = Math.max(rect.width, rect.height);
            let targetSize = minSize;

            // Algorithm to fit N nodes perfectly into available rect space without overflow
            while (minSize <= maxSize) {
                let mid = Math.floor((minSize + maxSize) / 2);
                let cols = Math.floor((rect.width + gap) / (mid + gap));
                let rows = Math.floor((rect.height + gap) / (mid + gap));
                
                if (cols * rows >= totalEntities) {
                    targetSize = mid;
                    minSize = mid + 1; 
                } else {
                    maxSize = mid - 1; 
                }
            }
            const size = Math.max(targetSize - 1, 1); 

            const frag = document.createDocumentFragment();
            for (let i = 0; i < totalEntities; i++) {
                const node = document.createElement('div');
                node.style.width = `${size}px`;
                node.style.height = `${size}px`;
                node.className = `circle-node ${i < elapsedEntities ? 'circle-elapsed' : 'circle-remaining'}`;
                node.style.animationDelay = `${(i % 50) * 0.015}s`;
                frag.appendChild(node);
            }
            gridCanvas.appendChild(frag);
        }

        let rsTimer;
        window.addEventListener('resize', () => {
            clearTimeout(rsTimer);
            rsTimer = setTimeout(() => { renderNodes(); }, 150);
        });

        // --- UI Modal Flow ---
        function toggleUI(show) {
            if (show) {
                setupModal.classList.remove('hidden');
                setTimeout(() => document.getElementById('modal-content').classList.replace('scale-95', 'scale-100'), 10);
            } else {
                document.getElementById('modal-content').classList.replace('scale-100', 'scale-95');
                setTimeout(() => setupModal.classList.add('hidden'), 300);
            }
        }

        fabBtn.addEventListener('click', () => toggleUI(true));
        modalBackdrop.addEventListener('click', () => toggleUI(false));

        function extractURL() {
            const st = new Date(inputStart.value);
            const en = new Date(inputEnd.value);
            if (isNaN(st) || isNaN(en)) return null;

            const url = new URL(window.location.origin + window.location.pathname);
            url.searchParams.set('a', formatDateToParam(st));
            url.searchParams.set('b', formatDateToParam(en));
            
            // Persist the city parameter if it exists
            const params = new URLSearchParams(window.location.search);
            const city = params.get('city');
            if (city) url.searchParams.set('city', city);

            return url.toString();
        }

        btnGenerate.addEventListener('click', () => {
            const url = extractURL();
            if(url) {
                window.history.pushState({}, '', url);
                initializeApp();
                toggleUI(false);
            }
        });

        btnCopy.addEventListener('click', () => {
            const url = extractURL();
            if(url) {
                navigator.clipboard.writeText(url).then(() => {
                    copyToast.classList.replace('opacity-0', 'opacity-100');
                    setTimeout(() => copyToast.classList.replace('opacity-100', 'opacity-0'), 2000);
                });
            }
        });

        // Ignite
        initializeApp();
    </script>
</body>
</html>
